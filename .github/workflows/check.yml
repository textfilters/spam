name: Check

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://npm.pkg.github.com
          scope: "@textfilters"
      - name: Install dependencies
        env:
          NODE_AUTH_TOKEN: ${{ github.token }}
        run: npm ci
      - name: Run checks
        run: npm run check
